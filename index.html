<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mercado</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="estilos.css">
</head>
<body class="bg-stone-50 font-sans text-stone-800 todo-capitalizado antialiased">

    <header class="encabezado-app py-3 px-4 sticky top-0 z-10 flex justify-between items-center shadow-xs">
        <div>
            <h1 id="app-title" class="text-base font-medium tracking-tight text-stone-700">🛒 Mi Lista</h1>
            <p id="total-estimado" class="text-[10px] text-stone-400 font-normal lowercase mt-0.5"></p>
        </div>
        <span id="contador-compras" class="text-[10px] bg-stone-100 text-stone-500 px-2 py-0.5 rounded-full font-medium">0 pnd</span>
    </header>

    <main class="p-3 max-w-md mx-auto">
        
        <section id="view-compras" class="tab-content">
            <div id="lista-compras-agrupada" class="space-y-3"></div>
        </section>

        <section id="view-despensa" class="tab-content hidden space-y-3">
            <div>
                <input type="text" id="search-despensa" placeholder="🔍 Buscar producto..." class="w-full p-2 bg-white border border-stone-200 rounded-lg focus:outline-none focus:border-stone-400 text-xs transition-colors">
            </div>
            
            <div class="bg-stone-200/50 rounded-xl overflow-hidden border border-stone-200/60">
                <button onclick="toggleCajon()" class="w-full p-2.5 flex justify-between items-center bg-stone-100 text-left text-xs font-medium text-stone-600 focus:outline-none select-none">
                    <span class="flex items-center gap-1.5">📌 Productos en Espera</span>
                    <span id="flecha-cajon" class="text-[10px] text-stone-400 transition-transform duration-200">▶</span>
                </button>
                <div id="contenido-cajon" class="hidden divide-y divide-stone-100 bg-white p-1"></div>
            </div>

            <div id="lista-despensa-agrupada" class="space-y-3"></div>
        </section>

        <section id="view-gestion" class="tab-content hidden space-y-3 text-xs">
            <div class="bg-white p-3 rounded-xl border border-stone-100">
                <h2 class="font-medium text-stone-400 mb-2 text-[10px] uppercase tracking-wider">📦 Nuevo Producto</h2>
                <form id="form-producto" class="space-y-2.5">
                    <div class="grid grid-cols-3 gap-2">
                        <input type="text" id="prod-nombre" placeholder="Producto" required class="col-span-2 p-2 bg-stone-50 rounded-lg focus:outline-none">
                        <input type="number" id="prod-precio" placeholder="$ Valor" step="any" required class="col-span-1 p-2 bg-stone-50 rounded-lg focus:outline-none text-right">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <select id="prod-categoria" required class="w-full p-2 bg-stone-50 rounded-lg focus:outline-none text-stone-500"></select>
                        <select id="prod-lugar" required class="w-full p-2 bg-stone-50 rounded-lg focus:outline-none text-stone-500"></select>
                    </div>
                    
                    <label class="flex items-center gap-2 p-2 bg-stone-50 rounded-lg cursor-pointer select-none text-stone-600 font-medium">
                        <input type="checkbox" id="prod-pendiente" class="w-3.5 h-3.5 rounded accent-stone-700">
                        <span>¿Dejar en espera / pendiente?</span>
                    </label>

                    <button type="submit" class="w-full bg-stone-700 text-white py-2 rounded-lg font-medium active:bg-stone-800 transition-colors">Agregar a la Despensa</button>
                </form>
                <p id="notificacion-guardado" class="text-[10px] text-emerald-700 mt-1 text-center hidden">✓ Añadido correctamente</p>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div class="bg-white p-2.5 rounded-xl border border-stone-100 flex flex-col justify-between">
                    <div>
                        <h2 class="font-medium text-stone-400 mb-1.5 text-[10px] uppercase tracking-wider">🗂️ Categoría</h2>
                        <form id="form-categoria" class="space-y-1.5">
                            <input type="text" id="cat-nombre" placeholder="Ej: Verduras" required class="w-full p-2 bg-stone-50 rounded-lg focus:outline-none text-xs">
                            <button type="submit" class="w-full bg-stone-700 text-white py-1.5 rounded-lg font-medium active:bg-stone-800 text-xs">Añadir</button>
                        </form>
                    </div>
                </div>

                <div class="bg-white p-2.5 rounded-xl border border-stone-100 flex flex-col justify-between">
                    <div>
                        <h2 class="font-medium text-stone-400 mb-1.5 text-[10px] uppercase tracking-wider">📍 Nuevo Lugar</h2>
                        <form id="form-lugar" class="space-y-1.5">
                            <input type="text" id="lug-nombre" placeholder="Ej: Éxito" required class="w-full p-2 bg-stone-50 rounded-lg focus:outline-none text-xs">
                            <button type="submit" class="w-full bg-stone-700 text-white py-1.5 rounded-lg font-medium active:bg-stone-800 text-xs">Añadir</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-stone-100 flex justify-around py-2 z-50 shadow-md">
        <button onclick="switchTab('compras', '🛒 Mi Lista', event)" class="nav-btn text-emerald-800 flex flex-col items-center gap-0.5 text-[10px] font-medium transition-colors cursor-pointer">
            <span class="text-base opacity-75">🛒</span> Lista
        </button>
        <button onclick="switchTab('despensa', '🗂️ Despensa', event)" class="nav-btn text-stone-400 flex flex-col items-center gap-0.5 text-[10px] font-medium transition-colors cursor-pointer">
            <span class="text-base opacity-40">🗂️</span> Despensa
        </button>
        <button onclick="switchTab('gestion', '⚙️ Configuración', event)" class="nav-btn text-stone-400 flex flex-col items-center gap-0.5 text-[10px] font-medium transition-colors cursor-pointer">
            <span class="text-base opacity-40">⚙️</span> Gestión
        </button>
    </nav>

    <script type="module" src="app.js"></script>
</body>
</html>
